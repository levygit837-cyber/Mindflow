          - generic [ref=e173]: "The final total calculation is incorrect because the `discount` parameter is being **added** to the gross amount instead of being **subtracted**. This leads to a higher total than expected, as confirmed by the test case in `tests/test_calculator.py`. ###Identified Fault * **File**: `app/calculator.py` * **Function**: `calculate_invoice_total` ### Analysis In `app/calculator.py`, the function is implemented as follows: ```python def calculate_invoice_total(subtotal: float, tax: float, discount: float) -> float: gross = subtotal + tax return round(gross + discount, 2) # Bug: should be gross - discount ``` According to the test case `test_calculate_invoice_total_subtracts_discount`, calling the function with `(100.0, 10.0, 5.0)` expects a result of `105.0` ($100 + 10 - 5$). However, the current code returns `115.0` ($100 + 10 + 5$). **Findings:** - **File**: `app/calculator.py` - **Function**: `calculate_invoice_total` - **Issue**: The logic incorrectly uses the addition operator (`+`) for the `discount` variable on line 3."
