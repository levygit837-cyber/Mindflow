[tool:pytest]
minversion = 6.0
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=mindflow_backend
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    controller: marks tests related to controllers
    service: marks tests related to services
    middleware: marks tests related to middleware
    api: marks tests related to API endpoints
    security: marks tests related to security features
    performance: marks tests related to performance
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:mindflow_backend.*
asyncio_mode = auto
