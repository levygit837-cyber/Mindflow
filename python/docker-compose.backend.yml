services:
  postgres:
    image: postgres:16
    container_name: omnimind-postgres
    environment:
      POSTGRES_DB: omnimind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - omnimind_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: omnimind-redis
    ports:
      - "6379:6379"

volumes:
  omnimind_pg_data:
