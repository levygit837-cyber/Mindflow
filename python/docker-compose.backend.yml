services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-mindflow-postgres-v1}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindflow_v1}
      POSTGRES_USER: ${POSTGRES_USER:-mindflow_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindflow_dev_local_2026}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - mindflow_pg_data_v1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindflow_app} -d ${POSTGRES_DB:-mindflow_v1}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kuzudb:
    image: kuzudb/kuzu:latest
    container_name: ${KUZUDB_CONTAINER_NAME:-mindflow-kuzudb-v1}
    ports:
      - "${KUZUDB_PORT:-8000}:8000"
    volumes:
      - mindflow_kuzudb_data:/data
    environment:
      - KUZU_DB_NAME=${KUZUDB_DATABASE:-mindflow_vectors}
    command: ["kuzu", "/data/${KUZUDB_DATABASE:-mindflow_vectors}", "--browser-port", "8000"]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ${RABBITMQ_CONTAINER_NAME:-mindflow-rabbitmq-v1}
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "15673:15672"  # Management interface
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VIRTUAL_HOST:-/}
    volumes:
      - mindflow_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mindflow_pg_data_v1:
  mindflow_kuzudb_data:
  mindflow_rabbitmq_data:
