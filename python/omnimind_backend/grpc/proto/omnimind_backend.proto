syntax = "proto3";

package omnimind.backend;

message ChatStreamRequest {
  string session_id = 1;
  string message = 2;
  string provider = 3;
  string model = 4;
  string run_id = 5;
}

message StreamEvent {
  string id = 1;
  int32 seq = 2;
  string type = 3;
  string mode = 4;
  string data = 5;
  string json_meta = 6;
}

service AgentRuntimeService {
  rpc StreamChat(ChatStreamRequest) returns (stream StreamEvent);
}
