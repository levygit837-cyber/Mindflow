repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --extra dev mypy omnimind_backend omnimind_desktop
        language: system
        pass_filenames: false
        files: ^(omnimind_backend|omnimind_desktop)/.*\.py$
